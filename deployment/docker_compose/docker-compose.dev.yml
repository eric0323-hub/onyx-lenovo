# Docker Compose Override for Development/Testing
# This file exposes service ports for development and testing purposes.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --wait
#
# Or set COMPOSE_FILE environment variable:
#   export COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml
#   docker compose up -d --wait

services:
  api_server:
    ports:
      - "${API_SERVER_HOST_PORT:-18082}:8080"
    deploy:
      resources:
        limits:
          cpus: "${API_SERVER_CPU_LIMIT:-0}"
          memory: "${API_SERVER_MEM_LIMIT:-0}"

  # Uncomment the block below to enable the MCP server for LKnow.
  # mcp_server:
  #   ports:
  #     - "${MCP_SERVER_HOST_PORT:-18090}:8090"

  nginx:
    ports: !override
      - "${HOST_PORT_80:-18081}:80"
      - "${HOST_PORT:-18030}:80"

  relational_db:
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"

  opensearch:
    ports:
      - "${OPENSEARCH_HOST_PORT:-19200}:9200"
    # Rootless Docker can reject the base OpenSearch ulimit settings, so clear
    # the inherited block entirely in the dev override.
    ulimits: !reset null
    environment:
      - bootstrap.memory_lock=false

  inference_model_server:
    ports:
      - "${MODEL_SERVER_HOST_PORT:-19000}:9000"

  cache:
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"

  web_server:
    environment:
      - HOSTNAME=0.0.0.0

  minio:
    # Use different ports to avoid conflicts with model servers.
    ports:
      - "${MINIO_API_HOST_PORT:-19004}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-19005}:9001"

  code-interpreter:
    profiles:
      - code-interpreter
    ports:
      - "${CODE_INTERPRETER_HOST_PORT:-18083}:8000"
